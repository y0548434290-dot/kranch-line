# דוגמה לקובץ ext.ini לשלוחת הזמנה
# קובץ זה נוצר אוטומטית על ידי המערכת

# הגדרות בסיסיות
type=menu
title=הזמנה 12345
message=ברוכים הבאים למערכת ההזמנות. לחץ 1 לאישור, 2 לביטול

# אפשרויות תפריט
option1=אישור הזמנה
option1_action=confirm_order

option2=ביטול הזמנה
option2_action=cancel_order

option3=שינוי הזמנה
option3_action=modify_order

# הגדרות טכניות
timeout=30
max_attempts=3
invalid_option_message=אפשרות לא תקינה. אנא נסה שוב.
timeout_message=זמן ההמתנה פג. מתנתק.

# הגדרות אבטחה
white_list=yes

# הגדרות נוספות
language=he
direction=rtl